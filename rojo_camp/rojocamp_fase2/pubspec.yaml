name: rojo_camp
description: "Aplikasi Pencatatan Pengunjung Kebun Rojo Camp"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Database lokal (Phase 1) ---
  sqflite: ^2.3.0
  path: ^1.9.0

  # --- State management (Phase 1) ---
  provider: ^6.1.2

  # --- UUID generator (Phase 1) ---
  uuid: ^4.5.1

  # --- Format tanggal (Phase 1) ---
  intl: ^0.20.2

  # --- Chart / visualisasi (Phase 5) ---
  fl_chart: ^1.2.0

  # --- Generate QR (Phase 3) ---
  qr_flutter: ^4.1.0

  # --- Scan QR via kamera (Phase 4) ---
  mobile_scanner: ^7.2.0

  # --- Share & export (Phase 5) ---
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # --- Cek koneksi internet (Phase 6) ---
  connectivity_plus: ^6.1.4

  # --- HTTP request ke Apps Script (Phase 6) ---
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
