name: rojo_camp
description: "Aplikasi Pencatatan Pengunjung Kebun Rojo Camp"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Database lokal
  sqflite: ^2.3.0
  path: ^1.9.0

  # State management
  provider: ^6.1.2

  # UUID generator
  uuid: ^4.5.1

  # Format tanggal
  intl: ^0.20.2

  # Chart
  fl_chart: ^1.2.0

  # Generate QR
  qr_flutter: ^4.1.0

  # Scan QR
  mobile_scanner: ^7.2.0

  # Share & export
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # Koneksi internet (Phase 6)
  connectivity_plus: ^6.1.4

  # HTTP request ke Apps Script (Phase 6)
  http: ^1.3.0

  # Simpan preferensi lokal (Phase 6 - last sync time)
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
