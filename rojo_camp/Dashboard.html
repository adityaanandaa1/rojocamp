<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Kebun Rojo Camp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F6FA;
      color: #222;
      font-size: 14px;
    }

    header {
      background: #0088FF;
      color: white;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    header h1 { font-size: 20px; font-weight: bold; }
    header span { font-size: 13px; opacity: 0.85; }

    main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

    /* Filter bar */
    .filter-bar {
      background: white;
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-group label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.4px; }
    .filter-group input, .filter-group select {
      padding: 8px 12px;
      border: 1px solid #E0E0E0;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .filter-group input:focus, .filter-group select:focus { border-color: #0088FF; }

    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.87; }
    .btn-primary { background: #0088FF; color: white; }
    .btn-secondary { background: #6B7280; color: white; }
    .btn-success { background: #22C55E; color: white; }

    /* Stat cards */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .stat-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .stat-value { font-size: 32px; font-weight: bold; color: #111; }
    .stat-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

    /* Info bar */
    .info-bar {
      background: white;
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #555;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    #record-count { font-weight: 600; color: #0088FF; }

    /* Table */
    .table-wrap {
      background: white;
      border-radius: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      overflow-x: auto;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
      min-width: 900px;
    }
    th {
      background: #0088FF;
      color: white;
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }
    td {
      padding: 11px 14px;
      border-bottom: 1px solid #F0F0F0;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #F8FAFF; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-aktif { background: #DCFCE7; color: #15803D; }
    .badge-nonaktif { background: #FEE2E2; color: #DC2626; }
    .badge-reservasi { background: #EFF6FF; color: #1D4ED8; }
    .badge-onsite { background: #FFF7ED; color: #C2410C; }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: #aaa;
    }
    .empty-state svg { width: 56px; height: 56px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
    .empty-state small { font-size: 12px; }

    .loading {
      padding: 40px;
      text-align: center;
      color: #0088FF;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏕️ Dashboard Kebun Rojo Camp</h1>
    <span id="header-sub">Memuat data...</span>
  </div>
</header>

<main>
  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Dari Tanggal</label>
      <input type="date" id="tgl-mulai">
    </div>
    <div class="filter-group">
      <label>Sampai Tanggal</label>
      <input type="date" id="tgl-selesai">
    </div>
    <div class="filter-group">
      <label>Status</label>
      <select id="filter-status">
        <option value="">Semua</option>
        <option value="AKTIF">Aktif</option>
        <option value="NON_AKTIF">Non-Aktif</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Jenis</label>
      <select id="filter-jenis">
        <option value="">Semua</option>
        <option value="RESERVASI">Reservasi</option>
        <option value="ONSITE">Onsite</option>
      </select>
    </div>
    <div class="filter-group">
      <label>&nbsp;</label>
      <button class="btn btn-primary" onclick="applyFilter()">Terapkan</button>
    </div>
    <div class="filter-group">
      <label>&nbsp;</label>
      <button class="btn btn-secondary" onclick="resetFilter()">Reset</button>
    </div>
    <div class="filter-group">
      <label>&nbsp;</label>
      <button class="btn btn-success" onclick="downloadCSV()">⬇ CSV</button>
    </div>
  </div>

  <!-- Stat cards -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">Total Rombongan</div>
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-sub">dalam filter aktif</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Aktif</div>
      <div class="stat-value" id="stat-aktif" style="color:#22C55E">—</div>
      <div class="stat-sub">masih di lokasi</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Non-Aktif</div>
      <div class="stat-value" id="stat-nonaktif" style="color:#EF4444">—</div>
      <div class="stat-sub">sudah checkout</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Pengunjung</div>
      <div class="stat-value" id="stat-orang">—</div>
      <div class="stat-sub">jumlah orang</div>
    </div>
  </div>

  <!-- Info bar -->
  <div class="info-bar">
    <span>Menampilkan <strong id="record-count">0</strong> rombongan</span>
    <span id="last-update" style="font-size:12px;color:#bbb"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="table-wrap">
    <div class="loading">Memuat data dari Google Sheets...</div>
  </div>
</main>

<script>
  var semuaData = [];
  var filtered = [];
  var HEADERS_CSV = ['No','Nama','Alamat','Tgl Masuk','Tgl Keluar','Jml Orang','Jenis Pesanan','Tenda','Status','Checkout','Keterangan','Dibuat'];

  // ── Init ───────────────────────────────────────────────────

  function init() {
    // Default filter: bulan ini
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    document.getElementById('tgl-mulai').value = y + '-' + m + '-01';
    document.getElementById('tgl-selesai').value = y + '-' + m + '-' + String(now.getDate()).padStart(2, '0');

    // Load data dari Apps Script
    google.script.run
      .withSuccessHandler(onDataLoaded)
      .withFailureHandler(onDataError)
      .ambilSemuaData();
  }

  function onDataLoaded(json) {
    semuaData = JSON.parse(json);
    document.getElementById('header-sub').textContent =
      semuaData.length + ' total rombongan · ' + new Date().toLocaleString('id-ID');
    document.getElementById('last-update').textContent =
      'Diperbarui: ' + new Date().toLocaleTimeString('id-ID');
    applyFilter();
  }

  function onDataError(err) {
    document.getElementById('table-wrap').innerHTML =
      '<div class="empty-state"><p>Gagal memuat data</p><small>' + err.message + '</small></div>';
  }

  // ── Filter ──────────────────────────────────────────────────

  function applyFilter() {
    var tglMulai  = document.getElementById('tgl-mulai').value;
    var tglSelesai = document.getElementById('tgl-selesai').value;
    var status    = document.getElementById('filter-status').value;
    var jenis     = document.getElementById('filter-jenis').value;

    filtered = semuaData.filter(function(r) {
      // Overlap: [r.tgl_mulai, r.tgl_selesai) overlap [filter_mulai, filter_selesai]
      if (tglMulai && r.tanggal_selesai && r.tanggal_selesai < tglMulai) return false;
      if (tglSelesai && r.tanggal_mulai && r.tanggal_mulai > tglSelesai) return false;
      if (status && r.status !== status) return false;
      if (jenis && r.jenis_pesanan !== jenis) return false;
      return true;
    });

    updateStats();
    renderTable();
  }

  function resetFilter() {
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-jenis').value  = '';
    filtered = semuaData;
    updateStats();
    renderTable();
  }

  // ── Stats ───────────────────────────────────────────────────

  function updateStats() {
    var aktif    = filtered.filter(function(r){ return r.status === 'AKTIF'; }).length;
    var nonAktif = filtered.filter(function(r){ return r.status === 'NON_AKTIF'; }).length;
    var totalOrg = filtered.reduce(function(s, r){ return s + (parseInt(r.jumlah_pengunjung) || 0); }, 0);

    document.getElementById('stat-total').textContent   = filtered.length;
    document.getElementById('stat-aktif').textContent   = aktif;
    document.getElementById('stat-nonaktif').textContent = nonAktif;
    document.getElementById('stat-orang').textContent   = totalOrg;
    document.getElementById('record-count').textContent = filtered.length;
  }

  // ── Table render ─────────────────────────────────────────────

  function renderTable() {
    var wrap = document.getElementById('table-wrap');

    if (filtered.length === 0) {
      wrap.innerHTML = '<div class="empty-state"><p>Tidak ada data untuk filter ini</p><small>Coba ubah rentang tanggal atau hapus filter</small></div>';
      return;
    }

    var html = '<table><thead><tr>'
      + '<th>#</th><th>Nama</th><th>Jenis Pesanan</th>'
      + '<th>Tenda</th><th>Masuk</th><th>Keluar</th>'
      + '<th>Jml Orang</th><th>Status</th><th>Waktu Checkout</th>'
      + '</tr></thead><tbody>';

    filtered.forEach(function(r, i) {
      var isAktif = r.status === 'AKTIF';
      var isRes   = r.jenis_pesanan === 'RESERVASI';

      html += '<tr>'
        + '<td style="color:#bbb">' + (i+1) + '</td>'
        + '<td><strong>' + esc(r.nama) + '</strong><br><small style="color:#aaa">' + esc(r.alamat) + '</small></td>'
        + '<td><span class="badge ' + (isRes ? 'badge-reservasi' : 'badge-onsite') + '">'
          + (isRes ? 'Reservasi' : 'Onsite') + '</span></td>'
        + '<td style="white-space:pre-line">' + esc((r.slot_terpilih_label || '').replace(/;/g,'\n')) + '</td>'
        + '<td>' + fmtDate(r.tanggal_mulai) + '</td>'
        + '<td>' + fmtDate(r.tanggal_selesai) + '</td>'
        + '<td style="text-align:center">' + (r.jumlah_pengunjung || '—') + '</td>'
        + '<td><span class="badge ' + (isAktif ? 'badge-aktif' : 'badge-nonaktif') + '">'
          + (isAktif ? 'Aktif' : 'Non-Aktif') + '</span></td>'
        + '<td>' + (r.waktu_checkout ? fmtDatetime(r.waktu_checkout) : '—') + '</td>'
        + '</tr>';
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  // ── CSV Download ─────────────────────────────────────────────

  function downloadCSV() {
    if (filtered.length === 0) {
      alert('Tidak ada data untuk di-download.');
      return;
    }

    var BOM = '\uFEFF'; // UTF-8 BOM agar Excel baca karakter Indonesia dengan benar
    var rows = [HEADERS_CSV.map(q).join(',')];

    filtered.forEach(function(r, i) {
      rows.push([
        i + 1,
        r.nama,
        r.alamat,
        fmtDate(r.tanggal_mulai),
        fmtDate(r.tanggal_selesai),
        r.jumlah_pengunjung,
        r.jenis_pesanan === 'RESERVASI' ? 'Reservasi' : 'Onsite',
        (r.slot_terpilih_label || '').replace(/;/g, ' | '),
        r.status === 'AKTIF' ? 'Aktif' : 'Non-Aktif',
        r.waktu_checkout ? fmtDatetime(r.waktu_checkout) : '-',
        r.keterangan,
        fmtDate(r.created_at)
      ].map(q).join(','));
    });

    var csv = BOM + rows.join('\n');
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var a    = document.createElement('a');
    var now  = new Date();
    a.href   = URL.createObjectURL(blob);
    a.download = 'rojocamp_' + now.toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // ── Helpers ───────────────────────────────────────────────────

  function q(v) {
    var s = String(v === null || v === undefined ? '' : v);
    if (s.includes(',') || s.includes('"') || s.includes('\n'))
      return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fmtDate(s) {
    if (!s) return '—';
    try {
      var parts = s.slice(0, 10).split('-');
      return parts[2] + '/' + parts[1] + '/' + parts[0];
    } catch(_) { return s; }
  }

  function fmtDatetime(s) {
    if (!s) return '—';
    try {
      var d = new Date(s);
      return d.toLocaleDateString('id-ID') + ' ' + d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    } catch(_) { return s; }
  }

  // ── Run ───────────────────────────────────────────────────────
  window.onload = init;
</script>
</body>
</html>
